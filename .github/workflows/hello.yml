name: Hello Runner
on:   
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [test, deploy]
  schedule:
    - cron: '*/5 * * * *'

jobs:
  say-hi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Event Type
        run: echo "Triggered by ${{ github.event_name }}"

      - name: Dispatch Type
        if: github.event_name == 'workflow_dispatch'
        run: echo "Option: ${{ github.event.inputs.environment }}"

      - name: Print stuff
        run: |
          echo "Hello from $(hostname)"
          uname -a
          pwd
          ls -la
          echo "That's it for now!"

