name: Hello Runner
on:   
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  say-hi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Print stuff
        run: |
          echo "Hello from $(hostname)"
          uname -a
          pwd
          ls -la
          echo "That's it for now!"
